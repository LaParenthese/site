# ============================================================
# La Parenthèse — Café & Librairie (Samois-sur-Seine)
# Configuration principale du site.
# ============================================================

baseURL = "https://laparenthese-samois.com/"

locale = "fr-FR"
defaultContentLanguage = "fr"
title = "La Parenthèse — Café & Librairie"
theme = "ananke"
copyright = "La Parenthèse, Samois-sur-Seine"

[params]
  # La page d'accueil liste les derniers billets de cette section.
  mainSections = ["actualites"]
  # Classe CSS du bandeau d'en-tête et du pied de page.
  # .bg-parenthese est définie dans assets/ananke/css/custom.css
  # (c'est là que se règlent toutes les couleurs de la marque).
  background_color_class = "bg-parenthese"
  body_classes = "bg-paper garamond"
  recent_posts_number = 3
  # Logo blanc (sans l'adresse) affiché en haut à gauche, bouton accueil.
  # Généré depuis le bandeau ; le favicon reprend les arbres du logo.
  site_logo = "/images/logo-nav.png"
  favicon = "/favicon.png"
  # Format des dates : « 14 juillet 2026 »
  date_format = "2 January 2006"
  # Image utilisée par défaut pour les aperçus de partage (og:image),
  # au format recommandé 1200×630 (générée depuis le logo)
  images = ["/images/carte-partage.png"]

  [params.ananke]
    show_recent_posts = true
    custom_css = ["custom.css"]

    [params.ananke.home]
      content_alignment = "center"

    # Boutons de partage affichés sur chaque billet (actualités, agenda).
    # Icônes seules : les libellés du thème sont en anglais.
    [params.ananke.social.share]
      networks = ["facebook", "whatsapp", "email"]
      sharetext = false

    # Lien « suivez-nous » vers l'Instagram de la librairie
    # (icône affichée dans la navigation et le pied de page).
    [params.ananke.social.follow]
      networks = ["instagram"]
    [params.ananke.social.instagram]
      username = "la_parenthese_librairie"

[markup.goldmark.renderer]
  # Autorise le HTML dans les fichiers Markdown (utile pour la page contact).
  unsafe = true

[[menus.main]]
  name = "Actualités"
  pageRef = "/actualites"
  weight = 10

[[menus.main]]
  name = "Agenda"
  pageRef = "/agenda"
  weight = 20

[[menus.main]]
  name = "La librairie"
  pageRef = "/la-librairie"
  weight = 30

[[menus.main]]
  name = "Contact"
  pageRef = "/contact"
  weight = 40
